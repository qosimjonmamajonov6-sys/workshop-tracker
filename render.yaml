services:
  - type: web
    name: workshop-tracker
    runtime: node
    plan: free
    buildCommand: npm run build
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: workshop-db
          property: connectionString
      - key: NODE_ENV
        value: production

databases:
  - name: workshop-db
    databaseName: workshop
    user: workshop_user
    plan: free
